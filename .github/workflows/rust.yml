name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    # The rtest harness has a built-in 60s-per-case watchdog, so a hung case
    # aborts loudly instead of blocking. `cargo test` needs no extra tooling.
    # (For an all-tests per-test timeout locally, `cargo nextest run` honours
    #  .config/nextest.toml — install with `cargo install cargo-nextest`.)
    - name: Run tests
      run: cargo test --verbose
