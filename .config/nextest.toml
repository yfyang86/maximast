# cargo-nextest configuration (OPTIONAL).
#
# The rtest harness already enforces a 60s-per-case timeout under plain
# `cargo test` (see crates/eval/tests/rtest_runner.rs). This config additionally
# bounds EVERY test to 60s when run via nextest:
#     cargo install cargo-nextest --locked   # one-time
#     cargo nextest run
# It is not required — `cargo test` works without nextest installed.

[profile.default]
# Mark a test "slow" after 60s and TERMINATE it (fail) after the first such
# period. So any single test case is bounded to ~60s — a runaway/hung test
# fails loudly instead of blocking the whole suite indefinitely.
slow-timeout = { period = "60s", terminate-after = 1 }

[profile.ci]
slow-timeout = { period = "60s", terminate-after = 1 }
# In CI, run every test even if some fail, so one timeout doesn't mask others.
fail-fast = false
